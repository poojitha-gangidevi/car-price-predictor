<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
  <title>Car Price Predictor</title>
</head>
<body>
  <div class="container mt-5">
    <div>
      <h1 class="text-center mb-4">Welcome to Car Price Predictor</h1>

      <form id="predict-form" method="POST" action="/predict">
        <div class="form-group">
          <label>Select Company:</label>
          <select class="form-control" name="company" id="company" required
           onchange="loadCarModels(this.value)">
              {% for company in companies %}
                <option value="{{ company }}">{{ company }}</option>
              {% endfor %}
           </select>

        </div>

        <div class="form-group">
          <label>Select Model:</label>
          <select class="form-control" name="car_model" id="car_models" required>
            {% for model in car_models %}
              <option value="{{ model }}">{{ model }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>Select Year of Purchase:</label>
          <select class="form-control" name="year" required>
            {% for year in years %}
              <option value="{{ year }}">{{ year }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>Select Fuel Type:</label>
          <select class="form-control" name="fuel_type" required>
            {% for fuel_type in fuel_types %}
              <option value="{{ fuel_type }}">{{ fuel_type }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>Enter Number of Kilometres Travelled:</label>
          <input type="number" class="form-control" name="kilo_driven"
                 placeholder="e.g. 45000" required>
        </div>

        <button type="button" class="btn btn-primary btn-block"
                onclick="sendForm()">Predict Price</button>
      </form>

      <h3 id="prediction" class="text-center mt-4"></h3>
    </div>
  </div>

<script>
  function loadCarModels(company) {
    const modelSelect = document.getElementById('car_models');
    modelSelect.innerHTML = '<option>Loading...</option>';

    if (!company || company === 'Select Company') {
      modelSelect.innerHTML = '<option value="">Select Model</option>';
      return;
    }

    fetch('/get_models/' + encodeURIComponent(company))
      .then(r => r.json())
      .then(models => {
        modelSelect.innerHTML = '';
        models.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m;
          opt.textContent = m;
          modelSelect.appendChild(opt);
        });
      });
  }

  function sendForm() {
    const form = document.getElementById('predict-form');
    const data = new FormData(form);
    fetch('/predict', { method: 'POST', body: data })
      .then(r => r.text())
      .then(price => {
        document.getElementById('prediction').innerText =
          'Predicted Price: ₹ ' + price;
      });
  }
</script>
